<!DOCTYPE html>
<html>
<head>

    <style>
        h1{

        *{

        }
        .mern{

        }

            padding: 10px;

        #first::before{

            display: block;
            font-size: 24px;
            font-weight: bold;

            margin-bottom: 20px;
        }
      #first::after {

            display: block;

        #first:hover {

        }
        #first{
